<div class="container-fluid">

    <div class="card-box">
        <h3>Crear cuenta</h3>
        <form id="registerForm"  novalidate>


            <div class="mb-3">
                <label class="form-label">Nombre Completo</label>
                <div class="input-group">
                    <span class="input-group-text"><i class="fa-solid fa-user"></i></span>
                    <input type="text" class="form-control" placeholder="Tu Nombre Completo" required>
                </div>
            </div>

            <div class="mb-3">
                <label class="form-label">Correo electronico</label>
                <div class="input-group">
                    <span class="input-group-text"><i class="fa-solid fa-envelope"></i></span>
                    <input type="email" class="form-control" placeholder="tuemail@ejemplo.com" required>
                </div>
            </div>

            <div class="mb-3">
                <label class="form-label">Contraseña</label>
                <div class="input-group">
                    <span class="input-group-text"><i class="fa-solid fa-lock"></i></span>
                    <input type="password" class="form-control" placeholder="Crea una Contraseña" required>
                </div>
            </div>

            <div class="mb-3">
                <label class="form-label">Confirmar Contraseña</label>
                <div class="input-group">
                    <span class="input-group-text"><i class="fa-solid fa-lock"></i></span>
                    <input type="password" class="form-control" placeholder="Repite la Contraseña" required>
                </div>
            </div>

            <button type="submit" class="btn-main">Registrate</button>

        </form>

        <p class="text-center mt-3" style="font-size: 14px;">
            Ya tienes cuenta =? <a href="login.html">Iniciar Sesion</a>
        </p>

    </div>













    <!-- scrips de bostrap -->
