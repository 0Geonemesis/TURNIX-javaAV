<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Turnix | Citas</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body class="dashboard-body">

    <div class="dashboard-layout">

        <!-- =========================
             MENÚ LATERAL
             ========================= -->
        <aside class="sidebar">
            <div>
                <div class="sidebar-brand">
                    <div class="logo-circle small">T</div>
                    <div>
                        <h2>Turnix</h2>
                        <p>Panel principal</p>
                    </div>
                </div>

                  <nav class="sidebar-menu">
    <a href="dashboard.html" class="menu-item">Dashboard</a>
    <a href="clientes.html" class="menu-item">Clientes</a>
    <a href="citas.html" class="menu-item active">Citas</a>
    <a href="filas.html" class="menu-item">Filas</a>
    <a href="reportes.html" class="menu-item">Reportes</a>
    <a href="perfil.html" class="menu-item">Perfil</a>
    <button id="logoutBtn" class="menu-item logout-btn">Cerrar sesión</button>
</nav>



            </div>
        </aside>

        <!-- =========================
             CONTENIDO PRINCIPAL
             ========================= -->
        <main class="main-content">

            <header class="topbar">
                <div>
                    <h1>Módulo de Citas</h1>
                    <p>Aquí podrás agendar, editar y controlar las citas de tus clientes.</p>
                </div>

                <div class="topbar-user">
                    <span id="userBadge">Usuario</span>
                </div>
            </header>

            <!-- Barra superior -->
            <section class="clientes-toolbar">
                <div class="search-box">
                    <input 
                        type="text" 
                        id="searchAppointmentInput" 
                        placeholder="Buscar por cliente, fecha, hora o estado..."
                    >
                </div>

                <button id="openAppointmentModalBtn" class="btn-inline-primary">
                    + Nueva cita
                </button>
            </section>

            <!-- Tabla -->
            <section class="panel-card">
                <div class="panel-header">
                    <h2>Lista de citas</h2>
                    <span id="appointmentsCountText">0 citas registradas</span>
                </div>

                <div class="table-wrapper">
                    <table>
                        <thead>
                            <tr>
                                <th>Cliente</th>
                                <th>Correo</th>
                                <th>Teléfono</th>
                                <th>Fecha</th>
                                <th>Hora</th>
                                <th>Estado</th>
                                <th>Acciones</th>
                            </tr>
                        </thead>
                        <tbody id="appointmentsTableBody">
                            <!-- citas.js pintará las filas aquí -->
                        </tbody>
                    </table>
                </div>
            </section>
        </main>
    </div>

    <!-- =========================
         MODAL DE CITAS
         ========================= -->
    <div id="appointmentModal" class="modal-overlay hidden">
        <div class="modal-card">
            <div class="modal-header">
                <h2 id="appointmentModalTitle">Nueva cita</h2>
                <button id="closeAppointmentModalBtn" class="modal-close-btn">&times;</button>
            </div>

            <form id="appointmentForm" class="modal-form">
                <!-- Si este input tiene un id, estamos editando; si no, estamos creando -->
                <input type="hidden" id="appointmentId">

                <div class="form-group">
                    <label for="appointmentClient">Cliente</label>
                    <select id="appointmentClient" required>
                        <option value="">Selecciona un cliente</option>
                    </select>
                </div>

                <div class="form-group">
                    <label for="appointmentDate">Fecha</label>
                    <input type="date" id="appointmentDate" required>
                </div>

                <div class="form-group">
                    <label for="appointmentTime">Hora</label>
                    <input type="time" id="appointmentTime" required>
                </div>

                <div class="form-group">
                    <label for="appointmentStatus">Estado</label>
                    <select id="appointmentStatus" required>
                        <option value="">Selecciona un estado</option>
                        <option value="Pendiente">Pendiente</option>
                        <option value="Confirmada">Confirmada</option>
                        <option value="Atendida">Atendida</option>
                        <option value="Cancelada">Cancelada</option>
                    </select>
                </div>

                <p id="appointmentFormMessage" class="form-message"></p>

                <div class="modal-actions">
                    <button type="button" id="cancelAppointmentModalBtn" class="btn-secondary">
                        Cancelar
                    </button>

                    <button type="submit" class="btn btn-primary">
                        Guardar cita
                    </button>
                </div>
            </form>
        </div>
    </div>

    <script src="js/citas.js"></script>
</body>
</html>
