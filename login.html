<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Iniciar sesion</title>
    <link rel="stylesheet" href="style.css">
    <!-- link iconos de cdjs -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css" integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw==" crossorigin="anonymous" referrerpolicy="no-referrer" />
    <!-- link del bost -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
    

</head>
<body>

    <!-- nav bar  -->
    <nav class="navbar navbar-expand-lg bg-body-tertiary">
<div class="container-fluid">
    <a class="navbar-brand" href="#">Navbar</a>
    <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNavAltMarkup" aria-controls="navbarNavAltMarkup" aria-expanded="false" aria-label="Toggle navigation">
    <span class="navbar-toggler-icon"></span>
    </button>
    <div class="collapse navbar-collapse" id="navbarNavAltMarkup">
    <div class="navbar-nav">
        <a class="nav-link active" aria-current="page" href="index.html">Home</a>
        <a class="nav-link" href="login.html">login</a>
        <a class="nav-link" href="register.html">Registro</a>
    </div>
    </div>
</div>
</nav>



    
    <div class="card-box">
        <h3>Iniciar Sesion</h3>
        <form id="formLogin" novalidate>
            <div class="mb-3 grupo">
            <!-- descrivimos el campo -->
                <label for="email" class="form-label">Correo electronico</label>
                <div class="input-group">
                    <span class="input-group-text"><i class="fa-solid fa-envelope"></i></span>
                    <input type="email" id="correo"  placeholder="U123556789@utp.edu.pe" required>
                    <!-- muestra el msj de error -->
                    <div class="error" id="errorCorreo"></div>
                </div>
            </div>



            <div class="mb-3 grupo">
                <label for="password" class="form-label">Contraseña</label>
                <div class="input-group">
                    <span class="input-group-text"><i class="fa-solid fa-lock"></i></span>
                    <input type="password" id="password" placeholder="******" required>
                    <div class="error" id="errorPassword"></div>
                </div>
            </div>
            <!-- botones del cuadrado ese -->
            <button type="submit" class="btn-main">Entrar</button>
            <!-- carga los usuarios de la api -->
            <button type="button" id="btnCargar" onclick="cargarUsuarios()" disabled>Cargar Usuario</button>
            <ul id="lista"></ul>
        </form>

        <p class="text-center mt-3" style="font-size: 14px;">
            no tienes cuenta =? <a href="register.html">Registrate</a>
        </p>

    </div>





    <!-- modal de bostrap -->

    <div class="position-fixed bottom-0 end-0 p-3" style="z-index: 11">
<div id="toastRegistro" class="toast align-items-center text-bg-success border-0" role="alert">
    <div class="d-flex">
    <div class="toast-body">
        ✔ Te has registrado correctamente
    </div>
    <button type="button" class="btn-close btn-close-white me-2 m-auto" data-bs-dismiss="toast"></button>
    </div>
</div>
</div>




    <script src="main.js"></script>
    <!-- scrips de bostrap -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js" integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI" crossorigin="anonymous"></script>
</body>
</html>
