<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Turnix | Clientes</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body class="dashboard-body">

    <div class="dashboard-layout">

        <!-- =========================
             SIDEBAR / MENÚ LATERAL
             ========================= -->
        <aside class="sidebar">
            <div>
                <div class="sidebar-brand">
                    <div class="logo-circle small">T</div>
                    <div>
                        <h2>Turnix</h2>
                        <p>Panel principal</p>
                    </div>
                </div>

                  <nav class="sidebar-menu">
    <a href="dashboard.html" class="menu-item">Dashboard</a>
    <a href="clientes.html" class="menu-item active">Clientes</a>
    <a href="citas.html" class="menu-item">Citas</a>
    <a href="filas.html" class="menu-item">Filas</a>
    <a href="reportes.html" class="menu-item">Reportes</a>
    <a href="perfil.html" class="menu-item">Perfil</a>
    <button id="logoutBtn" class="menu-item logout-btn">Cerrar sesión</button>
</nav>





            </div>
        </aside>

        <!-- =========================
             CONTENIDO PRINCIPAL
             ========================= -->
        <main class="main-content">
            
            <!-- Encabezado -->
            <header class="topbar">
                <div>
                    <h1>Módulo de Clientes</h1>
                    <p id="clientesWelcomeText">Aquí podrás registrar y gestionar tus clientes.</p>
                </div>

                <div class="topbar-user">
                    <span id="userBadge">Usuario</span>
                </div>
            </header>

            <!-- =========================
                 BLOQUE SUPERIOR:
                 buscador + botón nuevo cliente
                 ========================= -->
            <section class="clientes-toolbar">
                <div class="search-box">
                    <input 
                        type="text" 
                        id="searchClientInput" 
                        placeholder="Buscar por nombre, correo o teléfono..."
                    >
                </div>

                <button id="openClientModalBtn" class="btn-inline-primary">
                    + Nuevo cliente
                </button>
            </section>

            <!-- =========================
                 TABLA DE CLIENTES
                 ========================= -->
            <section class="panel-card">
                <div class="panel-header">
                    <h2>Lista de clientes</h2>
                    <span id="clientsCountText">0 clientes registrados</span>
                </div>

                <div class="table-wrapper">
                    <table>
                        <thead>
                            <tr>
                                <th>Nombre</th>
                                <th>Correo</th>
                                <th>Teléfono</th>
                                <th>Fecha de registro</th>
                                <th>Acciones</th>
                            </tr>
                        </thead>
                        <tbody id="clientsTableBody">
                            <!-- clientes.js llenará esta tabla -->
                        </tbody>
                    </table>
                </div>
            </section>
        </main>
    </div>

    <!-- =========================
         MODAL PARA CREAR / EDITAR CLIENTE
         ========================= -->
    <div id="clientModal" class="modal-overlay hidden">
        <div class="modal-card">
            <div class="modal-header">
                <h2 id="modalTitle">Nuevo cliente</h2>
                <button id="closeClientModalBtn" class="modal-close-btn">&times;</button>
            </div>

            <form id="clientForm" class="modal-form">
                <!-- 
                    Guardamos aquí el id del cliente cuando estamos editando.
                    Si está vacío, significa que estamos creando uno nuevo.
                -->
                <input type="hidden" id="clientId">

                <div class="form-group">
                    <label for="clientName">Nombre completo</label>
                    <input type="text" id="clientName" placeholder="Ejemplo: María Torres" required>
                </div>

                <div class="form-group">
                    <label for="clientEmail">Correo electrónico</label>
                    <input type="email" id="clientEmail" placeholder="cliente@correo.com" required>
                </div>

                <div class="form-group">
                    <label for="clientPhone">Teléfono</label>
                    <input type="text" id="clientPhone" placeholder="987654321" required>
                </div>

                <p id="clientFormMessage" class="form-message"></p>

                <div class="modal-actions">
                    <button type="button" id="cancelClientModalBtn" class="btn-secondary">
                        Cancelar
                    </button>

                    <button type="submit" class="btn btn-primary">
                        Guardar cliente
                    </button>
                </div>
            </form>
        </div>
    </div>

    <script src="js/clientes.js"></script>
</body>
</html>
